services:

  db:
    image: postgres:18
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: techcare_db
      POSTGRES_USER: techcareuser
      POSTGRES_PASSWORD: TechcarePCH2026

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: techcarepch@gmail.com
      PGADMIN_DEFAULT_PASSWORD: TechcarePCH2026

    ports:
      - "5050:80"

    depends_on:
      - db

volumes:
  postgres_data: